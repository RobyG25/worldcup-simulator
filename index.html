            padding: 0;
            box-sizing: border-box;
        }

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
        }

        .controls {
            text-align: center;
            margin: 30px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            margin: 0 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            font-size: 1.2em;
            color: #667eea;
            margin: 20px 0;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-size: 1em;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .score-input-panel {
            background: #f0f4ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            display: none;
        }

        .score-input-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .score-entry {
            display: grid;
            grid-template-columns: 1fr 0.3fr 0.3fr 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
        }

        .score-entry input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            text-align: center;
        }

        .score-entry button {
            padding: 8px 15px;
            font-size: 0.9em;
            margin: 0;
        }

        .stats-container {
            margin-top: 30px;
        }

        .stats-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            font-size: 0.9em;
        }

        .results-table thead {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }

        .results-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #dee2e6;
        }

        .results-table td {
            padding: 10px 12px;
            border: 1px solid #dee2e6;
        }

        .results-table tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        .results-table tbody tr:hover {
            background: #e7f0ff;
        }

        .match-name {
            font-weight: 600;
            color: #333;
        }

        .prediction {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
        }

        .stage {
            display: inline-block;
            background: #764ba2;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .confidence {
            font-size: 0.85em;
            color: #666;
        }

        .high-confidence {
            color: #28a745;
            font-weight: 600;
        }

        .medium-confidence {
            color: #ffc107;
            font-weight: 600;
        }

        .low-confidence {
            color: #dc3545;
            font-weight: 600;
        }

        .date-header {
            background: #667eea !important;
            color: white !important;
            font-weight: bold !important;
            padding: 12px !important;
            text-align: center !important;
        }

        .actual-result {
            background: #e8f5e9 !important;

            background: #4caf50;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 5px;
        }

            .results-table th, .results-table td { padding: 6px 8px; }

        function updateTeamStatsFromScores() {
            teamStats = JSON.parse(JSON.stringify(BASE_TEAM_STATS));
            const teamRecords = {};
            
            WORLD_CUP_MATCHES.forEach(match => {
                if(matchScores[match.id]) {
                    const score = matchScores[match.id];
                    const homeGoals = parseInt(score.home);
                    const awayGoals = parseInt(score.away);
                    
                    if(!teamRecords[match.home]) teamRecords[match.home] = { wins: 0, losses: 0, draws: 0, goalsFor: 0, goalsAgainst: 0, matches: 0 };
                    if(!teamRecords[match.away]) teamRecords[match.away] = { wins: 0, losses: 0, draws: 0, goalsFor: 0, goalsAgainst: 0, matches: 0 };
                    
                    teamRecords[match.home].goalsFor += homeGoals;
                    teamRecords[match.home].goalsAgainst += awayGoals;
                    teamRecords[match.away].goalsFor += awayGoals;
                    teamRecords[match.away].goalsAgainst += homeGoals;
                    teamRecords[match.home].matches++;
                    teamRecords[match.away].matches++;
                    
                    if(homeGoals > awayGoals) {
                        teamRecords[match.home].wins++;
                        teamRecords[match.away].losses++;
                    } else if(awayGoals > homeGoals) {
                        teamRecords[match.away].wins++;
                        teamRecords[match.home].losses++;
                    } else {
                        teamRecords[match.home].draws++;
                        teamRecords[match.away].draws++;
                    }
                }
            });
            
            Object.keys(teamRecords).forEach(team => {
                const record = teamRecords[team];
                const winRate = (record.wins / record.matches) || 0;
                const formBoost = 0.85 + (winRate * 0.35);
                const newGoalsPerGame = record.matches > 0 ? (record.goalsFor / record.matches) : teamStats[team].goalsPerGame;
                const newDefense = record.matches > 0 ? (1 - (record.goalsAgainst / record.matches) / 2) : teamStats[team].defensiveStrength;
                
                teamStats[team].form = Math.max(0.7, Math.min(1.3, formBoost));
                teamStats[team].goalsPerGame = newGoalsPerGame;
                teamStats[team].defensiveStrength = Math.max(0.5, Math.min(1, newDefense));
            });
        }

                    <input type="number" id="score_${match.id}_away" min="0" max="20" placeholder="0" value="${matchScores[match.id]?.away || ''}">

            });
        }

        function deleteScore(matchId) {
            delete matchScores[matchId];
            document.getElementById(`score_${matchId}_home`).value = '';
            document.getElementById(`score_${matchId}_away`).value = '';
        }

        function saveAndUpdateScores() {
            WORLD_CUP_MATCHES.forEach(match => {
                const homeInput = document.getElementById(`score_${match.id}_home`);
                const awayInput = document.getElementById(`score_${match.id}_away`);
                if(homeInput.value !== '' || awayInput.value !== '') {
                    matchScores[match.id] = {
                        home: homeInput.value || 0,
                        away: awayInput.value || 0
                    };
                }
            });
            updateTeamStatsFromScores();
            runSimulations();
            document.getElementById('scoreInputPanel').style.display = 'none';
        }

        class MatchSimulator {
            constructor(homeTeam, awayTeam) {
                this.homeTeam = homeTeam;
                this.awayTeam = awayTeam;
                this.homeStats = teamStats[homeTeam] || { rating: 1400, goalsPerGame: 1.2, form: 0.85, defensiveStrength: 0.70 };
                this.awayStats = teamStats[awayTeam] || { rating: 1400, goalsPerGame: 1.2, form: 0.85, defensiveStrength: 0.70 };
            }

            calculateGoals(isHome) {
                const stats = isHome ? this.homeStats : this.awayStats;
                const oppStats = isHome ? this.awayStats : this.homeStats;
                const baseGoals = stats.goalsPerGame * stats.form;
                const defenseFactor = 1 - (oppStats.defensiveStrength * 0.2);
                const homeAdvantage = isHome ? 1.15 : 1.0;
                const expectedGoals = baseGoals * defenseFactor * homeAdvantage;
                return Math.max(0, Math.round(expectedGoals + (Math.random() * 2 - 0.5)));
            }

            simulate() {
                return { homeGoals: this.calculateGoals(true), awayGoals: this.calculateGoals(false) };
            }

            run100Simulations() {
                const results = [];
                for(let i = 0; i < 100; i++) results.push(this.simulate());
                const homeGoalsArr = results.map(r => r.homeGoals);
                const awayGoalsArr = results.map(r => r.awayGoals);
                const scores = results.map(r => `${r.homeGoals}-${r.awayGoals}`);
                return {
                    avgScore: { home: (homeGoalsArr.reduce((a,b) => a+b, 0)/100).toFixed(2), away: (awayGoalsArr.reduce((a,b) => a+b, 0)/100).toFixed(2) },
                    medianScore: { home: this.getMedian(homeGoalsArr), away: this.getMedian(awayGoalsArr) },
                    mostCommonScore: this.getMostCommon(scores),
                    wins: this.calculateWins(results),
                    draws: this.calculateDraws(results)
                };
            }

            getMedian(arr) {
                const sorted = [...arr].sort((a,b) => a-b);
                const mid = Math.floor(sorted.length/2);
                return sorted.length%2 !== 0 ? sorted[mid] : ((sorted[mid-1]+sorted[mid])/2).toFixed(1);
            }

            getMostCommon(arr) {
                const freq = {};
                arr.forEach(item => freq[item] = (freq[item]||0)+1);
                return Object.keys(freq).reduce((a,b) => freq[a] > freq[b] ? a : b);
            }

            calculateWins(results) {
                let home=0, away=0;
                results.forEach(r => {
                    if(r.homeGoals > r.awayGoals) home++;
                    else if(r.awayGoals > r.homeGoals) away++;
                });
                return { home: ((home/100)*100).toFixed(1), away: ((away/100)*100).toFixed(1) };
            }

            calculateDraws(results) {
                const draws = results.filter(r => r.homeGoals === r.awayGoals).length;
                return ((draws/100)*100).toFixed(1);
            }
        }

        function runSimulations() {
            document.getElementById('loadingContainer').style.display = 'block';
            document.getElementById('simulateBtn').disabled = true;
            setTimeout(() => {
                const results = WORLD_CUP_MATCHES.map(match => {
                    const sim = new MatchSimulator(match.home, match.away).run100Simulations();
                    return { ...match, simulation: sim };
                });
                displayResults(results);
                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('simulateBtn').disabled = false;
            }, 100);
        }

        function displayResults(results) {
            const sortedResults = results.sort((a,b) => new Date(a.date) - new Date(b.date));
            const groupedByDate = {};
            sortedResults.forEach(result => {
                if(!groupedByDate[result.date]) groupedByDate[result.date] = [];
                groupedByDate[result.date].push(result);
            });
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            Object.keys(groupedByDate).sort().forEach(date => {
                const dateObj = new Date(date);
                const formattedDate = dateObj.toLocaleDateString('en-US', dateOptions);
                const dateHeaderRow = document.createElement('tr');
                dateHeaderRow.innerHTML = `<td colspan="7" class="date-header">📅 ${formattedDate}</td>`;
                tbody.appendChild(dateHeaderRow);
                groupedByDate[date].forEach(result => {
                    const sim = result.simulation;
                    const homeStats = teamStats[result.home] || { rating: 1400 };
                    const awayStats = teamStats[result.away] || { rating: 1400 };
                    const homeWinProb = parseFloat(sim.wins.home);
                    const drawProb = parseFloat(sim.draws);
                    const awayWinProb = parseFloat(sim.wins.away);
                    const maxProb = Math.max(homeWinProb, drawProb, awayWinProb);
                    let prediction = '', confidence = '';
                    if(homeWinProb === maxProb) {
                        prediction = `${result.home} Win (${homeWinProb}%)`;
                        confidence = getConfidenceLevel(homeWinProb);
                    } else if(awayWinProb === maxProb) {
                        prediction = `${result.away} Win (${awayWinProb}%)`;
                        confidence = getConfidenceLevel(awayWinProb);
                    } else {
                        prediction = `Draw (${drawProb}%)`;
                        confidence = getConfidenceLevel(drawProb);
                    }
                    const row = document.createElement('tr');
                    let actualScoreHtml = '-';
                    let rowClass = '';
                    if(matchScores[result.id]) {
                        actualScoreHtml = `${matchScores[result.id].home}-${matchScores[result.id].away} <span class="result-badge">✓ Actual</span>`;
                        rowClass = 'actual-result';
                    }
                    row.className = rowClass;
                    row.innerHTML = `
                        <td><span class="stage">${result.stage}</span></td>
                        <td><span class="match-name">${result.home} vs ${result.away}</span></td>
                        <td>${actualScoreHtml}</td>
                        <td>${homeStats.rating} / ${awayStats.rating}</td>
                        <td><div class="prediction">Avg: ${sim.avgScore.home}-${sim.avgScore.away}</div><div class="prediction">Median: ${sim.medianScore.home}-${sim.medianScore.away}</div><div class="prediction">Most Likely: ${sim.mostCommonScore}</div></td>
                        <td>${prediction}</td>
                        <td class="confidence ${confidence.class}">${confidence.text}<br><small>(${maxProb}% certainty)</small></td>
                    `;
                    tbody.appendChild(row);
                });
            });
            document.getElementById('resultsTable').style.display = 'table';
            document.getElementById('statsInfo').style.display = 'block';
            document.getElementById('resultsSummary').textContent = `${results.length} matches analyzed. ${Object.keys(matchScores).length} actual scores entered. 🏆`;
            const status = document.getElementById('statusContainer');
            status.innerHTML = '<div class="status success">✅ Predictions Updated! ' + (Object.keys(matchScores).length > 0 ? '📊 Using ' + Object.keys(matchScores).length + ' real match results for accuracy!' : '') + '</div>';
        }

        function getConfidenceLevel(prob) {
            if(prob >= 70) return { text: '🔥 Very High', class: 'high-confidence' };
            else if(prob >= 55) return { text: '📈 High', class: 'high-confidence' };
            else if(prob >= 45) return { text: '⚖️ Moderate', class: 'medium-confidence' };
            else if(prob >= 30) return { text: '📉 Low', class: 'low-confidence' };
            else return { text: '❓ Very Low', class: 'low-confidence' };
        }

        document.getElementById('simulateBtn').addEventListener('click', runSimulations);
        document.getElementById('toggleScoresBtn').addEventListener('click', () => {
            const panel = document.getElementById('scoreInputPanel');
            if(panel.style.display === 'none') {
                buildScoreInputs();
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        });
        document.getElementById('updateScoresBtn').addEventListener('click', saveAndUpdateScores);
        document.getElementById('clearScoresBtn').addEventListener('click', () => {
            matchScores = {};
            buildScoreInputs();
            updateTeamStatsFromScores();
            runSimulations();
        });
    </script>
</body>
</html>
